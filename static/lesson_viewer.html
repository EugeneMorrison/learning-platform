<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Viewer - Learning Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .lesson-content {
            padding: 40px;
        }
        
        .block {
            margin-bottom: 40px;
            padding: 30px;
            border-radius: 12px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
        }
        
        .block-text {
            background: #fff;
            border-left-color: #4ade80;
        }
        
        .block-quiz {
            background: #fff7ed;
            border-left-color: #fb923c;
        }
        
        .block-code {
            background: #f0f9ff;
            border-left-color: #0ea5e9;
        }
        
        .block-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        
        .block-icon {
            font-size: 24px;
        }
        
        .block-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }
        
        .block-content h1, .block-content h2, .block-content h3 {
            margin-top: 20px;
            margin-bottom: 15px;
            color: #1f2937;
        }
        
        .block-content h2 {
            font-size: 24px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 8px;
        }
        
        .block-content h3 {
            font-size: 20px;
            color: #667eea;
        }
        
        .block-content p {
            margin-bottom: 15px;
        }
        
        .block-content code {
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #dc2626;
            font-size: 14px;
        }
        
        .block-content pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
        }
        
        .block-content pre code {
            background: none;
            color: inherit;
            padding: 0;
        }
        
        .quiz-question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1f2937;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .quiz-option {
            padding: 15px 20px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .quiz-option:hover {
            border-color: #667eea;
            background: #f9fafb;
            transform: translateX(4px);
        }
        
        .quiz-option.selected {
            border-color: #667eea;
            background: #ede9fe;
        }
        
        .quiz-option.correct {
            border-color: #22c55e;
            background: #dcfce7;
        }
        
        .quiz-option.incorrect {
            border-color: #ef4444;
            background: #fee2e2;
        }
        
        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .quiz-feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
        }
        
        .quiz-feedback.correct {
            background: #dcfce7;
            color: #166534;
        }
        
        .quiz-feedback.incorrect {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .code-prompt {
            margin-bottom: 20px;
            white-space: pre-wrap;
        }
        
        .code-editor {
            background: #1e293b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .code-editor textarea {
            width: 100%;
            min-height: 150px;
            background: #0f172a;
            color: #e2e8f0;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border-radius: 4px;
            resize: vertical;
        }
        
        .code-editor textarea:focus {
            outline: 2px solid #667eea;
        }
        
        .run-button {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .run-button:hover {
            background: #0284c7;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #667eea;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
        }
        
        .block-number {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: #666;
        }
        
        .block {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Learning Platform</h1>
            <p>Interactive Python Lessons</p>
        </div>
        
        <div id="app" class="lesson-content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading lesson...</p>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = 'http://127.0.0.1:9000/api';
        const LESSON_ID = '6f1c0c31-7be5-4434-ac25-c00f8031d15c'; // Your lesson ID
        
        // Simple token - in real app, this would be from login
        // For now, we'll try without authentication for demonstration
        
        async function fetchLesson() {
            try {
                // Fetch lesson info
                const lessonResponse = await fetch(`${API_BASE}/lessons/${LESSON_ID}/`);
                
                if (!lessonResponse.ok) {
                    throw new Error('Failed to fetch lesson');
                }
                
                const lesson = await lessonResponse.json();
                
                // Fetch blocks
                const blocksResponse = await fetch(`${API_BASE}/blocks/?lesson=${LESSON_ID}`);
                
                if (!blocksResponse.ok) {
                    throw new Error('Failed to fetch blocks');
                }
                
                const blocks = await blocksResponse.json();
                
                // Render lesson
                renderLesson(lesson, blocks);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('app').innerHTML = `
                    <div class="error">
                        <h3>⚠️ Error Loading Lesson</h3>
                        <p>${error.message}</p>
                        <p>Make sure you're enrolled in this course or logged in as the author.</p>
                        <p><small>Lesson ID: ${LESSON_ID}</small></p>
                    </div>
                `;
            }
        }
        
        function renderLesson(lesson, blocks) {
            const app = document.getElementById('app');
            
            let html = `<h1 style="margin-bottom: 30px; color: #1f2937;">${lesson.title}</h1>`;
            
            blocks.forEach((block, index) => {
                html += renderBlock(block, index + 1);
            });
            
            app.innerHTML = html;
            
            // Add event listeners
            addQuizListeners();
        }
        
        function renderBlock(block, number) {
            const type = block.type.toLowerCase();
            
            if (type === 'text') {
                return `
                    <div class="block block-text">
                        <div class="block-number">#${number}</div>
                        <div class="block-header">
                            <span class="block-icon">📝</span>
                            <span class="block-title">Theory</span>
                        </div>
                        <div class="block-content">
                            ${block.content.html}
                        </div>
                    </div>
                `;
            }
            
            if (type === 'quiz') {
                return `
                    <div class="block block-quiz">
                        <div class="block-number">#${number}</div>
                        <div class="block-header">
                            <span class="block-icon">❓</span>
                            <span class="block-title">Quiz Question</span>
                        </div>
                        <div class="quiz-question">${block.content.question}</div>
                        <div class="quiz-options" data-block-id="${block.id}" data-correct="${block.content.correct_answer}">
                            ${block.content.options.map((option, idx) => `
                                <div class="quiz-option" data-index="${idx}">
                                    <div class="option-letter">${String.fromCharCode(65 + idx)}</div>
                                    <div>${option}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="quiz-feedback" style="display: none;"></div>
                    </div>
                `;
            }
            
            if (type === 'code') {
                return `
                    <div class="block block-code">
                        <div class="block-number">#${number}</div>
                        <div class="block-header">
                            <span class="block-icon">💻</span>
                            <span class="block-title">Code Exercise</span>
                        </div>
                        <div class="code-prompt">${block.content.prompt}</div>
                        <div class="code-editor">
                            <textarea placeholder="# Write your code here...">${block.content.starter_code || ''}</textarea>
                        </div>
                        <button class="run-button">▶ Run Code</button>
                        <div class="code-feedback" style="display: none; margin-top: 15px;"></div>
                    </div>
                `;
            }
            
            return '';
        }
        
        function addQuizListeners() {
            document.querySelectorAll('.quiz-option').forEach(option => {
                option.addEventListener('click', function() {
                    const container = this.closest('.quiz-options');
                    const selectedIndex = parseInt(this.dataset.index);
                    const correctIndex = parseInt(container.dataset.correct);
                    const feedback = this.closest('.block').querySelector('.quiz-feedback');
                    
                    // Remove previous selections
                    container.querySelectorAll('.quiz-option').forEach(opt => {
                        opt.classList.remove('selected', 'correct', 'incorrect');
                    });
                    
                    // Mark selection
                    this.classList.add('selected');
                    
                    // Show feedback
                    if (selectedIndex === correctIndex) {
                        this.classList.add('correct');
                        feedback.className = 'quiz-feedback correct';
                        feedback.textContent = '✅ Correct! Great job!';
                        feedback.style.display = 'block';
                    } else {
                        this.classList.add('incorrect');
                        container.querySelectorAll('.quiz-option')[correctIndex].classList.add('correct');
                        feedback.className = 'quiz-feedback incorrect';
                        feedback.textContent = `❌ Incorrect. The correct answer is ${String.fromCharCode(65 + correctIndex)}.`;
                        feedback.style.display = 'block';
                    }
                });
            });
        }
        
        // Load lesson when page loads
        fetchLesson();
    </script>
</body>
</html>
